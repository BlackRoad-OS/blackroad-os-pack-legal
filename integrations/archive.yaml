# 🧾 Archive Integration

# Configuration for legal artifacts archiving in blackroad-os-archive

name: archive-integration
version: "1.0.0"
description: |
  Defines how legal workflow artifacts are archived to blackroad-os-archive
  for audit, compliance, and historical record purposes.

# 🎯 Purpose
purpose:
  - Maintain complete audit trail of legal workflows
  - Store immutable records of approvals and decisions
  - Support compliance and regulatory requirements
  - Enable historical analysis and reporting

# 📦 Archive Structure
archive_structure:
  base_path: "legal-pack/"
  
  directories:
    # Legal review artifacts
    legal_reviews:
      path: "legal-reviews/{year}/{month}/"
      contents:
        - approval_records
        - rejection_records
        - review_summaries
        - correspondence
      retention: "permanent"
      
    # Policy documents
    policies:
      path: "policies/{policy_type}/"
      contents:
        - policy_versions
        - change_logs
        - approval_records
      retention: "permanent"
      
    # Checklists
    checklists:
      path: "checklists/{year}/{month}/"
      contents:
        - completed_checklists
        - sign_off_records
      retention: "7 years"
      
    # Audit logs
    audit_logs:
      path: "audit-logs/{year}/{month}/"
      contents:
        - workflow_events
        - state_transitions
        - user_actions
      retention: "7 years"
      
    # Compliance artifacts
    compliance:
      path: "compliance/{year}/"
      contents:
        - regulatory_filings
        - compliance_attestations
        - audit_reports
      retention: "permanent"

# 📄 Artifact Definitions
artifacts:
  # Approval record
  approval_record:
    schema:
      required:
        - workflow_id
        - workflow_type
        - approver
        - approval_timestamp
        - approval_type
      optional:
        - conditions
        - notes
        - delegated_by
    file_format: "json"
    naming: "{workflow_id}_approval_{timestamp}.json"
    integrity:
      checksum: "sha256"
      signature: "optional"

  # Rejection record
  rejection_record:
    schema:
      required:
        - workflow_id
        - workflow_type
        - rejector
        - rejection_timestamp
        - rejection_reason
      optional:
        - notes
        - resubmission_guidance
    file_format: "json"
    naming: "{workflow_id}_rejection_{timestamp}.json"
    integrity:
      checksum: "sha256"

  # Review summary
  review_summary:
    schema:
      required:
        - workflow_id
        - summary_text
        - reviewer
        - review_date
      optional:
        - risk_assessment
        - recommendations
        - attachments
    file_format: "markdown"
    naming: "{workflow_id}_summary.md"
    integrity:
      checksum: "sha256"

  # Policy version
  policy_version:
    schema:
      required:
        - policy_type
        - version
        - effective_date
        - content
        - content_hash
      optional:
        - change_summary
        - approval_reference
        - notification_reference
    file_format: "markdown"
    naming: "{policy_type}_v{version}.md"
    integrity:
      checksum: "sha256"
    additional_files:
      - "{policy_type}_v{version}_metadata.json"

  # Checklist completion
  checklist_completion:
    schema:
      required:
        - checklist_id
        - checklist_type
        - completion_timestamp
        - completed_by
        - items
      optional:
        - notes
        - exceptions
    file_format: "json"
    naming: "{checklist_id}_completion.json"
    integrity:
      checksum: "sha256"

  # Audit log entry
  audit_log_entry:
    schema:
      required:
        - timestamp
        - event_type
        - actor
        - action
        - target
      optional:
        - metadata
        - ip_address
        - session_id
    file_format: "jsonl"  # JSON Lines for append-only
    naming: "audit_{date}.jsonl"
    integrity:
      checksum: "sha256"
      append_only: true

# 🔒 Immutability Rules
immutability:
  # Artifacts cannot be modified after archive
  enforce: true
  
  # Exceptions (if any)
  exceptions: []
  
  # Deletion policy
  deletion:
    allowed: false
    exceptions:
      - "court_order"
      - "regulatory_requirement"
    requires_approval:
      - "legal_lead"
      - "compliance_officer"
    audit_requirement: true

# 🏷️ Metadata Requirements
metadata:
  required_for_all:
    - archived_at
    - archived_by
    - source_workflow
    - artifact_type
    - content_hash
    
  indexed_fields:
    - workflow_id
    - policy_type
    - approval_date
    - approver
    - risk_level
    - state

# 🔄 Archive Events
archive_events:
  # Events that trigger archiving
  triggers:
    - workflow_state: "approved"
      action: archive_approval_record
      
    - workflow_state: "rejected"
      action: archive_rejection_record
      
    - workflow_state: "archived"
      action: archive_full_workflow
      
    - event: "policy_published"
      action: archive_policy_version
      
    - event: "checklist_completed"
      action: archive_checklist

  # High-risk workflows
  high_risk:
    # HIGH-RISK LEGAL FLOW – HUMAN APPROVAL REQUIRED
    marker: "HIGH-RISK"
    additional_artifacts:
      - executive_approval
      - risk_assessment
      - compliance_attestation
    immediate_archive: true
    notify_on_archive:
      - compliance_officer
      - legal_lead

# 📊 Retention Policies
retention:
  policies:
    permanent:
      duration: "forever"
      review_frequency: "never"
      deletion: "prohibited"
      
    regulatory:
      duration: "7 years"
      review_frequency: "annual"
      deletion: "after_retention_period"
      approval_required: true
      
    standard:
      duration: "5 years"
      review_frequency: "annual"
      deletion: "after_retention_period"
      approval_required: false

  by_artifact_type:
    approval_record: "permanent"
    rejection_record: "permanent"
    policy_version: "permanent"
    review_summary: "regulatory"
    checklist_completion: "regulatory"
    audit_log_entry: "regulatory"
    correspondence: "standard"

# 🔍 Search & Retrieval
search:
  enabled: true
  
  searchable_fields:
    - workflow_id
    - policy_type
    - approver
    - date_range
    - risk_level
    - state
    - content (full-text)
    
  filters:
    - artifact_type
    - date_range
    - workflow_type
    - approver
    - risk_level

  export:
    formats:
      - JSON
      - PDF
      - ZIP (bulk)
    audit_export: true

# 🔐 Access Control
access_control:
  read:
    - legal_team
    - compliance_team
    - audit_team
    - executive_team
    
  write:
    - legal_pack_agents
    - legal_admins
    
  delete:
    - none  # Deletion requires special approval process

  export:
    - compliance_officer
    - legal_lead
    - external_auditors (with approval)

# ✅ Integrity Verification
integrity:
  checksums:
    algorithm: "sha256"
    verify_on_read: true
    store_manifest: true
    
  manifests:
    generate_on: "archive_complete"
    format: "json"
    contents:
      - artifact_list
      - checksums
      - metadata
      - archive_timestamp
      
  verification_schedule:
    frequency: "weekly"
    on_failure:
      - alert_compliance
      - create_incident

# 📡 Integration with Archive Repo
integration:
  repo: "blackroad-os-archive"
  
  api_operations:
    - create_artifact
    - read_artifact
    - list_artifacts
    - search
    - verify_integrity
    - generate_report
    
  webhooks:
    - event: "artifact_archived"
      notify: ["prism-console", "audit-log"]
    - event: "integrity_failure"
      notify: ["compliance-team", "security-team"]
